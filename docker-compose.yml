services:
  wiauto-backend:
    container_name: wiauto-backend
    build:
      target: production
      context: .
      args:
        - PORT=${PORT:-4000}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file: .env

    networks:
      - wiauto-network

    depends_on:
      - postgres
      - redis

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512m"
        reservations:
          cpus: "0.25"
          memory: "256m"

  postgres:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wiautopassword
      - POSTGRES_DB=wiauto
    networks:
      - wiauto-network
    env_file: .env
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wiauto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    networks:
      - wiauto-network
    ports:
      - 6381:6379
    volumes:
      - redis_data:/data
  #     ]
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    env_file: .env

    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL}
      - MINIO_SERVER_URL=${MINIO_ENDPOINT}
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    networks:
      - wiauto-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # opensearch_data:
networks:
  wiauto-network:
    driver: bridge