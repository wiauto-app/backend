services:

  postgres:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=wiautopassword
      - POSTGRES_DB=wiauto
    networks:
      - wiauto-network
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wiauto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    networks:
      - wiauto-network
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
      
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=odP.L97brnxM%
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - wiauto-network

  wiauto-dev:
    container_name: wiauto-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_started
    env_file: .env
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
    build:
      dockerfile: Dockerfile.dev
      context: .
      args:
        - PORT=${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "9229:9229"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
    networks:
      - wiauto-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "768m"
        reservations:
          cpus: "0.25"
          memory: "256m"

  # k6:
  #   image: ghcr.io/grafana/xk6-dashboard:0.7.2
  #   container_name: k6
  #   volumes:
  #     - ./tests/performance:/tests/performance
  #     - ./k6-results:/home/k6
  #   ports:
  #     - "5665:5665"
  #   environment:
  #     BASE_URL: "http://host.docker.internal:3000"
  #     K6_WEB_DASHBOARD_EXPORT: "report.html"
  #     K6_WEB_DASHBOARD_PERIOD: "1s"
